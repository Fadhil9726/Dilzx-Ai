<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DxzM Share · Files</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #070b17;
      background-image: radial-gradient(circle at 25% 20%, rgba(30, 80, 140, 0.25) 0%, #070b17 90%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header */
    .glass-header {
      background: rgba(8, 12, 25, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border: 1px solid rgba(0, 180, 255, 0.3);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .dxzm-svg {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 0 6px #2f6eff);
    }
    .brand h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #6e9eff, #b280ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand p {
      font-size: 0.7rem;
      color: #8e9fc9;
    }

    .stats-group {
      display: flex;
      gap: 1.2rem;
    }
    .stat-card {
      background: rgba(20, 28, 48, 0.8);
      border-radius: 1.2rem;
      padding: 0.4rem 1.2rem;
      text-align: center;
      border: 1px solid rgba(0, 180, 255, 0.25);
    }
    .stat-number {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, #c0ddff, #5f9eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .stat-label {
      font-size: 0.65rem;
      color: #9aabda;
    }

    /* upload zone */
    .upload-card {
      background: rgba(10, 15, 30, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.8rem;
      padding: 1.6rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(0, 180, 255, 0.25);
    }
    .drop-zone {
      border: 2px dashed #2f3a6e;
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .drop-zone:hover {
      border-color: #5f8eff;
      background: rgba(95, 142, 255, 0.05);
    }
    .sender-row {
      margin-top: 1.2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .sender-input {
      flex: 2;
      background: #0f1322;
      border: 1px solid #2a345a;
      border-radius: 2rem;
      padding: 0.8rem 1.2rem;
      color: white;
    }
    .batch-btn {
      background: linear-gradient(135deg, #1f2a60, #0f1950);
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 2rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .file-preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      max-height: 85px;
      overflow-y: auto;
    }
    .file-tag {
      background: #151e36;
      border-radius: 2rem;
      padding: 0.3rem 0.9rem;
      font-size: 0.7rem;
      color: #bfd0ff;
    }

    /* progress status kirim */
    .progress-area {
      margin: 1rem 0 0.5rem;
    }
    .progress-bar-bg {
      background: #1a2038;
      border-radius: 1rem;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #5f8eff, #a881ff);
      transition: width 0.2s;
    }
    .status-text {
      font-size: 0.7rem;
      color: #b9c8ff;
      margin-top: 0.3rem;
      display: flex;
      justify-content: space-between;
    }

    /* gallery publik (semua orang bisa lihat) */
    .gallery-wrapper {
      background: rgba(10, 15, 30, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 1.8rem;
      padding: 1.2rem;
      border: 1px solid rgba(0, 180, 255, 0.15);
    }
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .filter-group {
      display: flex;
      gap: 0.6rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.3rem;
      border-radius: 2rem;
    }
    .filter-btn {
      background: transparent;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 1.5rem;
      color: #9aa9d0;
      cursor: pointer;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #2f45a0, #1b2a6e);
      color: white;
    }
    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1rem;
      max-height: 580px;
      overflow-y: auto;
    }
    .file-item {
      background: rgba(18, 24, 45, 0.8);
      border-radius: 1.2rem;
      padding: 0.7rem;
      transition: 0.2s;
      border: 1px solid rgba(70, 130, 200, 0.2);
    }
    .file-item:hover {
      transform: translateY(-3px);
      border-color: #4e7eff;
    }
    .img-thumb {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 0.8rem;
      background: #0c1020;
    }
    .icon-thumb {
      width: 100%;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c1020;
      border-radius: 0.8rem;
    }
    .file-meta {
      margin-top: 0.5rem;
    }
    .file-title {
      font-size: 0.75rem;
      font-weight: 500;
      color: #eef3ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-sender {
      font-size: 0.65rem;
      color: #8a9ad0;
      margin-top: 0.1rem;
    }
    .action-buttons {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .mini-btn {
      background: #252e4a;
      border: none;
      padding: 0.25rem 0;
      border-radius: 0.7rem;
      color: white;
      font-size: 0.7rem;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    /* modal preview */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.94);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #0f1424;
      border-radius: 2rem;
      max-width: 90%;
      max-height: 90%;
      padding: 1rem;
      border: 1px solid #3f6eff;
    }
    .modal-media {
      max-width: 100%;
      max-height: 65vh;
      border-radius: 1rem;
    }
    .close-modal {
      position: absolute;
      top: 1rem;
      right: 2rem;
      font-size: 2rem;
      cursor: pointer;
      color: #bbb;
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #101a38;
      border-left: 4px solid #5f8eff;
      padding: 0.7rem 1.2rem;
      border-radius: 1rem;
      color: white;
      z-index: 200;
      display: none;
    }
    .toast.show {
      display: block;
      animation: slideFade 2s ease;
    }
    @keyframes slideFade {
      0% { opacity: 0; transform: translateX(30px); }
      15% { opacity: 1; transform: translateX(0); }
      85% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="glass-header">
    <div class="logo-area">
      <div class="dxzm-svg">
        <svg viewBox="0 0 100 100" fill="none">
          <rect x="20" y="25" width="60" height="50" rx="14" stroke="#5f9eff" stroke-width="3.5" fill="none"/>
          <path d="M38 45 L50 58 L62 45" stroke="#a881ff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <circle cx="50" cy="68" r="5" fill="#5f9eff" />
          <path d="M68 32 L78 22 M32 32 L22 22" stroke="#5f9eff" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="brand">
        <h1>DxzM Share Files</h1>
        <p>-------------------</p>
      </div>
    </div>
    <div class="stats-group">
      <div class="stat-card"><div class="stat-number" id="totalFilesCount">0</div><div class="stat-label">Total file</div></div>
      <div class="stat-card"><div class="stat-number" id="totalSizeCount">0</div><div class="stat-label">Total MB</div></div>
    </div>
  </div>

  <!-- UPLOAD SECTION (untuk semua orang yang mau share) -->
  <div class="upload-card">
    <div class="drop-zone" id="uploadDropZone">
      <div style="margin-bottom: 0.5rem;">📂 Drag & drop atau klik — upload </div>
      <div style="font-size:0.7rem; color:#8d9ed7;">foto, video, dokumen, zip, apk — akan langsung terlihat</div>
      <input type="file" id="batchFileInput" multiple style="display:none">
    </div>
    <div class="sender-row">
      <input type="text" id="senderName" class="sender-input" placeholder="Nama kamu ()" value="Nama Kamuuuuuuu">
      <button id="batchUploadBtn" class="batch-btn">✈Kirim</button>
    </div>
    <div id="selectedPreviewArea" class="file-preview-list"></div>
    <div id="uploadProgressArea" class="progress-area" style="display: none;">
      <div class="progress-bar-bg"><div id="uploadProgressFill" class="progress-fill"></div></div>
      <div class="status-text"><span id="uploadStatusMsg">Mengirim...</span><span id="uploadCountMsg">0 / 0</span></div>
    </div>
  </div>

  <!-- GALLERY PUBLIK (SEMUA ORANG BISA LIHAT) -->
  <div class="gallery-wrapper">
    <div class="gallery-header">
      <span style="color:#eef3ff;">🌍 Galeri — semua file yang sudah dibagikan</span>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="image">Gambar</button>
        <button class="filter-btn" data-filter="video">Video</button>
        <button class="filter-btn" data-filter="document">Dokumen</button>
      </div>
    </div>
    <div class="files-grid" id="publicFilesGrid"></div>
  </div>
</div>

<!-- Modal Preview -->
<div class="modal" id="previewModal">
  <span class="close-modal" id="closeModalBtn">&times;</span>
  <div class="modal-content" id="modalInner"></div>
</div>
<div class="toast" id="toastMsg"></div>

<script>
  // --------------------------------------------------------------
  // STORAGE PUBLIK (localStorage -> bisa diakses oleh siapa saja yang buka web ini)
  let publicFiles = [];

  const STORAGE_KEY = 'dxzm_public_library';

  function loadPublicFiles() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      publicFiles = JSON.parse(stored);
      renderPublicGallery();
      updateStatsUI();
    }
  }

  function savePublicFiles() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(publicFiles));
    renderPublicGallery();
    updateStatsUI();
  }

  function updateStatsUI() {
    document.getElementById('totalFilesCount').innerText = publicFiles.length;
    const totalBytes = publicFiles.reduce((sum, f) => sum + (f.size || 0), 0);
    const totalMB = (totalBytes / (1024 * 1024)).toFixed(1);
    document.getElementById('totalSizeCount').innerText = totalMB;
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function getFileTypeCategory(mime) {
    if (mime.startsWith('image/')) return 'image';
    if (mime.startsWith('video/')) return 'video';
    if (mime.includes('pdf') || mime.includes('document') || mime.includes('text') || mime.includes('sheet')) return 'document';
    return 'other';
  }

  // Preview sebelum upload
  let currentSelectedFiles = [];
  function updateFilePreview(files) {
    const container = document.getElementById('selectedPreviewArea');
    container.innerHTML = '';
    Array.from(files).slice(0, 15).forEach(f => {
      const chip = document.createElement('span');
      chip.className = 'file-tag';
      chip.innerText = f.name.length > 28 ? f.name.slice(0, 25) + '…' : f.name;
      container.appendChild(chip);
    });
    if (files.length > 15) {
      const more = document.createElement('span');
      more.className = 'file-tag';
      more.innerText = `+${files.length - 15} file`;
      container.appendChild(more);
    }
  }

  // PROSES UPLOAD KE PUBLIK (LANGSUNG SEMUA ORANG BISA LIHAT)
  let isUploading = false;
  async function uploadFilesToPublic(files, senderName) {
    if (isUploading) {
      showToast("⏳ Masih ada proses upload, tunggu sebentar");
      return;
    }
    if (!files.length) return;

    isUploading = true;
    const progressArea = document.getElementById('uploadProgressArea');
    const progressFill = document.getElementById('uploadProgressFill');
    const statusMsg = document.getElementById('uploadStatusMsg');
    const countSpan = document.getElementById('uploadCountMsg');
    progressArea.style.display = 'block';
    progressFill.style.width = '0%';

    const total = files.length;
    let completed = 0;
    let successEntries = [];

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const fileId = Date.now() + '-' + Math.random().toString(36).substring(2, 10);
      const category = getFileTypeCategory(file.type);
      statusMsg.innerText = `📤 Mengirim: ${file.name}`;
      countSpan.innerText = `${i+1} / ${total}`;
      progressFill.style.width = `${((i+1)/total)*100}%`;

      await new Promise(r => setTimeout(r, 35));
      const reader = new FileReader();
      const fileData = await new Promise((resolve) => {
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
      });

      successEntries.push({
        id: fileId,
        name: file.name,
        size: file.size,
        type: file.type,
        category: category,
        sender: senderName.trim() || "Anonymous",
        data: fileData,
        timestamp: Date.now(),
        public: true
      });
      completed++;
    }

    if (successEntries.length) {
      publicFiles = [...successEntries, ...publicFiles];
      savePublicFiles();
      showToast(`✅ ${successEntries.length} file berhasil dibagikan ke publik! semua orang bisa lihat.`);
    } else {
      showToast("⚠️ Tidak ada file yang dikirim");
    }

    progressFill.style.width = '100%';
    statusMsg.innerText = '✨ Selesai! file tersedia untuk semua orang ✨';
    setTimeout(() => {
      progressArea.style.display = 'none';
      progressFill.style.width = '0%';
    }, 1800);

    isUploading = false;
    currentSelectedFiles = [];
    document.getElementById('selectedPreviewArea').innerHTML = '';
    document.getElementById('batchFileInput').value = '';
  }

  // RENDER GALERI PUBLIK (BISA DILIHAT SEMUA ORANG)
  let currentFilter = 'all';
  function renderPublicGallery() {
    const filtered = publicFiles.filter(f => {
      if (currentFilter === 'all') return true;
      return f.category === currentFilter;
    });
    const grid = document.getElementById('publicFilesGrid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2.5rem; color:#8c9ed0;">✨ Belum ada file. Jadi orang pertama yang share! ✨</div>';
      return;
    }
    grid.innerHTML = filtered.map(file => {
      const isImage = file.category === 'image';
      const isVideo = file.category === 'video';
      return `
        <div class="file-item" data-id="${file.id}">
          ${isImage ? `<img src="${file.data}" class="img-thumb" alt="${file.name}">` : ''}
          ${isVideo ? `<video src="${file.data}" class="img-thumb" style="pointer-events:none;"></video>` : ''}
          ${!isImage && !isVideo ? `<div class="icon-thumb"><svg width="48" viewBox="0 0 100 100"><path d="M30 25 L70 25 L75 35 L75 75 L25 75 Z" stroke="#5f9eff" stroke-width="2.5" fill="none"/><path d="M42 48 L58 48 M42 58 L58 58" stroke="#7c8bc0" stroke-width="2"/></svg></div>` : ''}
          <div class="file-meta">
            <div class="file-title">${escapeHtml(file.name.substring(0, 30))}${file.name.length > 30 ? '…' : ''}</div>
            <div class="file-sender">👤 ${escapeHtml(file.sender)} · ${formatBytes(file.size)}</div>
          </div>
          <div class="action-buttons">
            <button class="mini-btn viewBtn" data-id="${file.id}">👁️ Lihat</button>
            <button class="mini-btn downloadBtn" data-id="${file.id}">⬇️ Download</button>
          </div>
        </div>
      `;
    }).join('');

    // event listener tombol lihat & download
    document.querySelectorAll('.viewBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const found = publicFiles.find(f => f.id === id);
        if (found) openPublicPreview(found);
      });
    });
    document.querySelectorAll('.downloadBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const found = publicFiles.find(f => f.id === id);
        if (found) downloadPublicFile(found);
      });
    });
  }

  function openPublicPreview(file) {
    const modal = document.getElementById('previewModal');
    const modalInner = document.getElementById('modalInner');
    const isImage = file.category === 'image';
    const isVideo = file.category === 'video';
    if (isImage) {
      modalInner.innerHTML = `<img src="${file.data}" class="modal-media"><div style="margin-top:0.7rem;"><strong>${file.name}</strong><br>📦 ${formatBytes(file.size)}<br>👤 Pengirim: ${escapeHtml(file.sender)}<br>🌍 Status: publik — semua orang bisa lihat</div>`;
    } else if (isVideo) {
      modalInner.innerHTML = `<video src="${file.data}" class="modal-media" controls autoplay></video><div style="margin-top:0.7rem;"><strong>${file.name}</strong><br>📦 ${formatBytes(file.size)}<br>👤 ${escapeHtml(file.sender)}<br>🌍 Publik</div>`;
    } else {
      modalInner.innerHTML = `<div style="text-align:center; padding:1rem;"><div style="font-size:3.5rem;">📄</div><div><strong>${file.name}</strong></div><div>${formatBytes(file.size)}</div><div>👤 Pengirim: ${escapeHtml(file.sender)}</div><div>🌍 Akses publik</div><button id="modalDownloadBtn" class="mini-btn" style="margin-top:1rem;">⬇️ Download</button></div>`;
      setTimeout(() => {
        const dl = document.getElementById('modalDownloadBtn');
        if (dl) dl.onclick = () => downloadPublicFile(file);
      }, 20);
    }
    modal.classList.add('active');
  }

  function downloadPublicFile(file) {
    const a = document.createElement('a');
    a.href = file.data;
    a.download = file.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast(`⬇️ Download ${file.name}`);
  }

  function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ---------- EVENT UPLOAD ----------
  const dropZone = document.getElementById('uploadDropZone');
  const fileInput = document.getElementById('batchFileInput');
  const uploadBtn = document.getElementById('batchUploadBtn');
  const senderField = document.getElementById('senderName');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#8aadff'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#2f3a6e'; });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.style.borderColor = '#2f3a6e';
    const files = e.dataTransfer.files;
    if (files.length) {
      currentSelectedFiles = Array.from(files);
      updateFilePreview(currentSelectedFiles);
      fileInput.files = files;
    }
  });

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) {
      currentSelectedFiles = Array.from(e.target.files);
      updateFilePreview(currentSelectedFiles);
    }
  });

  uploadBtn.addEventListener('click', async () => {
    if (!currentSelectedFiles.length) {
      showToast("📂 Pilih file dulu ya");
      return;
    }
    const sender = senderField.value.trim() || "Anonymous";
    await uploadFilesToPublic(currentSelectedFiles, sender);
    currentSelectedFiles = [];
    document.getElementById('selectedPreviewArea').innerHTML = '';
    fileInput.value = '';
  });

  // Filter gallery
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      renderPublicGallery();
    });
  });

  // Modal close
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('previewModal').classList.remove('active');
  });
  window.addEventListener('click', (e) => {
    const modal = document.getElementById('previewModal');
    if (e.target === modal) modal.classList.remove('active');
  });

  loadPublicFiles();
</script>
</body>
</html>
